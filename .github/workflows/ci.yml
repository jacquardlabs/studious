name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  markdown:
    name: markdownlint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "20"
      - run: npx -y markdownlint-cli2@0.23.0

  python-checks:
    name: link-check + schema + unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5.4.2
      - name: Link-check references
        run: uv run --no-project python scripts/check_references.py
      - name: Validate plugin manifest
        run: uv run --no-project python scripts/validate_plugin.py
      - name: Unit tests
        run: uv run --no-project --with pytest pytest tests/python -v

  ledger:
    name: gate-ledger tests
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Ensure git and jq are available
        run: |
          command -v git >/dev/null || { echo "git is required but not found" >&2; exit 1; }
          if ! command -v jq >/dev/null; then
            if [ "$RUNNER_OS" = "macOS" ]; then
              brew install jq
            else
              sudo apt-get update && sudo apt-get install -y jq
            fi
          fi
      - name: Gate-ledger integration tests
        run: bash tests/test_gate_ledger.sh

  shellcheck:
    name: shellcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Install shellcheck 0.11.0
        run: |
          curl -fsSL -o /tmp/shellcheck.tar.xz \
            https://github.com/koalaman/shellcheck/releases/download/v0.11.0/shellcheck-v0.11.0.linux.x86_64.tar.xz
          tar -xJf /tmp/shellcheck.tar.xz -C /tmp
          sudo install /tmp/shellcheck-v0.11.0/shellcheck /usr/local/bin/shellcheck
      - run: shellcheck bin/gate-ledger hooks/gate-reminder.sh tests/test_gate_ledger.sh tests/test_workflows_lint.sh scripts/install-dev.sh

  workflows-js:
    name: workflows/ JS checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "20"
      - name: node --check
        run: |
          for f in workflows/*.js; do
            node --check "$f"
          done
      - name: eslint
        run: npx -y eslint@10.6.0 --report-unused-disable-directives workflows/
      - name: Lint regression tests (eslint.config.mjs)
        run: bash tests/test_workflows_lint.sh

  board-ui-js:
    name: board-ui pure-logic tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "20"
      - name: node --check
        run: node --check assets/board-ui/app.js
      - name: node --test (pure derivation functions)
        run: node --test tests/js/*.js
